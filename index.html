<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農田守護者：稻之試煉</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #8BC34A;
            --danger: #FF5252;
            --info: #2196F3;
            --bg: #F1F8E9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #333; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .stats-bar { display: flex; justify-content: space-around; background: #E8F5E9; padding: 15px; border-radius: 10px; margin-bottom: 20px; position: sticky; top: 0; }
        .stat { text-align: center; font-weight: bold; }
        .event-card { border: 2px solid var(--secondary); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; background: #f0f0f0; }
        .option-btn:hover { background: var(--secondary); color: white; }
        .hidden { display: none; }
        .result-item { margin: 10px 0; font-size: 18px; }
        #feedback { font-style: italic; color: #666; margin-top: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>🌾 農田守護者：稻之試煉</h2>
    
    <div class="stats-bar">
        <div class="stat">💰 金幣<br><span id="coins">10</span></div>
        <div class="stat">❤️ 愛心<br><span id="hearts">5</span></div>
        <div class="stat">🌾 產量<br><span id="yield">0</span></div>
    </div>

    <div id="game-play">
        <h3 id="stage-title">階段 1：育苗與打田</h3>
        <p id="stage-desc">春天來了，你要如何準備你的土地？</p>
        <div id="options">
            </div>
    </div>

    <div id="game-over" class="hidden">
        <h3>🎉 年度收成報告</h3>
        <div id="results"></div>
        <div id="feedback"></div>
        <button class="option-btn" onclick="location.reload()" style="background: var(--primary); color: white;">重新挑戰</button>
    </div>
</div>

<script>
    let state = { coins: 10, hearts: 5, yield: 0, stage: 0 };

    const stages = [
        {
            title: "第一關：育苗與下肥",
            desc: "鄰居都在用化肥，長得又快又美。你的選擇是？",
            options: [
                { text: "慣行：強效化肥 (-1💰, -1❤️)", calc: () => { state.coins -= 1; state.hearts -= 1; state.yield += 10; } },
                { text: "有機：有機堆肥 (-3💰, +1❤️)", calc: () => { state.coins -= 3; state.hearts += 1; state.yield += 8; } },
                { text: "自然：覆蓋乾草 (-0💰, +2❤️)", calc: () => { state.hearts += 2; state.yield += 5; } }
            ]
        },
        {
            title: "第二關：螺害危機",
            desc: "警告！福壽螺正在吃秧苗！",
            options: [
                { text: "慣行：噴灑藥劑 (-1💰, -2❤️)", calc: () => { state.coins -= 1; state.hearts -= 2; } },
                { text: "有機：手工撿螺 (-4💰, +0❤️)", calc: () => { state.coins -= 4; } },
                { text: "自然：合鴨共生 (-2💰, +1❤️)", calc: () => { 
                    state.coins -= 2; 
                    if(Math.random() > 0.3) { state.hearts += 1; } else { state.yield -= 2; alert("喔不！鴨子罷工，產量稍微下降了"); }
                } }
            ]
        },
        {
            title: "第三關：病蟲害與天氣",
            desc: "梅雨季來臨，稻熱病爆發了！",
            options: [
                { text: "慣行：強效殺菌 (-1💰, -1❤️)", calc: () => { state.coins -= 1; state.hearts -= 1; } },
                { text: "有機：木醋液防護 (-3💰, +0❤️)", calc: () => { state.coins -= 3; } },
                { text: "自然：觀察不處理 (-0💰)", calc: () => { 
                    if(state.hearts < 6) { state.yield -= 4; alert("因為土地不夠健康，病蟲害造成了損失"); }
                } }
            ]
        }
    ];

    function updateDisplay() {
        document.getElementById('coins').innerText = state.coins;
        document.getElementById('hearts').innerText = state.hearts;
        document.getElementById('yield').innerText = state.yield;
    }

    function renderStage() {
        if (state.stage >= stages.length) {
            showGameOver();
            return;
        }
        const s = stages[state.stage];
        document.getElementById('stage-title').innerText = s.title;
        document.getElementById('stage-desc').innerText = s.desc;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                opt.calc();
                state.stage++;
                updateDisplay();
                renderStage();
            };
            optDiv.appendChild(btn);
        });
    }

    function showGameOver() {
        document.getElementById('game-play').className = 'hidden';
        document.getElementById('game-over').className = '';
        
        let price = 1;
        let growthMindsetMsg = "";
        
        if (state.hearts >= 7) { 
            price = 5; 
            growthMindsetMsg = "【永續大師】你證明了守護土地雖然慢，但價值最高 (Price x5)！Growth Mindset: 為了長遠目標，你展現了極大的耐心。";
        } else if (state.hearts >= 4) { 
            price = 3; 
            growthMindsetMsg = "【友善農夫】你找到了平衡點 (Price x3)。Growth Mindset: 持續在挑戰中調整策略，你做得很棒！";
        } else { 
            price = 1; 
            growthMindsetMsg = "【產量先鋒】雖然賺了錢，但土地累壞了 (Price x1)。Growth Mindset: 這次的數據告訴我們，過度依賴藥劑會失去未來的競爭力，下次試試養土吧！";
        }

        if (state.hearts <= 0) { state.yield = 0; growthMindsetMsg = "【土地倒下】愛心歸零，土地無法再生產了。這次的失敗是最珍貴的教訓，想想看哪個環節可以改進？"; }

        const total = (state.yield * price) + state.coins;
        document.getElementById('results').innerHTML = `
            <div class="result-item">最終產量：${state.yield}</div>
            <div class="result-item">收購單價：$${price}</div>
            <div class="result-item"><strong>最終總收益：$${total}</strong></div>
        `;
        document.getElementById('feedback').innerText = growthMindsetMsg;
    }

    updateDisplay();
    renderStage();
</script>

</body>
</html>
